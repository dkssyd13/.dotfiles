# macOS-like application shortcuts
bindd = ALT, SPACE, Launch apps, exec, omarchy-launch-walker
bindd = ALT, Q, Close window, killactive,
bindd = ALT, W, Close tab or window, sendshortcut, CTRL, W,
bindd = ALT, C, Copy, sendshortcut, CTRL, Insert,
bindd = ALT, V, Paste, sendshortcut, SHIFT, Insert,
bindd = ALT, BACKSPACE, Select line backward, sendshortcut, SHIFT, HOME,
bind = ALT, BACKSPACE, sendshortcut, , BACKSPACE,
unbind = SUPER, BACKSPACE
bindd = SUPER, BACKSPACE, Delete word backward, sendshortcut, CTRL, BACKSPACE,
bindd = ALT, X, Cut, sendshortcut, CTRL, X,
bindd = ALT, A, Select all, sendshortcut, CTRL, A,
bindd = ALT, Z, Undo, sendshortcut, CTRL, Z,
bindd = ALT SHIFT, Z, Redo, sendshortcut, CTRL SHIFT, Z,
bindd = ALT, S, Save, sendshortcut, CTRL, S,
bindd = ALT, F, Find, sendshortcut, CTRL, F,
bindd = ALT, N, New window, sendshortcut, CTRL, N,
bindd = ALT, T, New tab, sendshortcut, CTRL, T,
bindd = ALT SHIFT, T, Reopen closed tab, sendshortcut, CTRL SHIFT, T,
bindd = ALT, L, Focus location, sendshortcut, CTRL, L,
bindd = ALT, R, Reload, sendshortcut, CTRL, R,
bindd = ALT SHIFT, R, Hard reload, sendshortcut, CTRL SHIFT, R,
bindd = ALT, O, Open, sendshortcut, CTRL, O,
bindd = ALT, P, Print, sendshortcut, CTRL, P,
bindd = ALT, COMMA, Preferences, sendshortcut, CTRL, COMMA,

# Window manager bindings

# Replace only Omarchy bindings that are remapped below.
unbind = SUPER, J
unbind = SUPER, K
unbind = SUPER, L
unbind = SUPER, W
unbind = SUPER, SPACE
unbind = SUPER, TAB
unbind = SUPER, code:20
unbind = SUPER, code:21
unbind = SUPER SHIFT, SPACE
unbind = SUPER SHIFT, COMMA

# Focus windows
bindd = SUPER, H, Focus left, movefocus, l
bindd = SUPER, J, Focus down, movefocus, d
bindd = SUPER, K, Focus up, movefocus, u
bindd = SUPER, L, Focus right, movefocus, r

# Move windows
bindd = SUPER SHIFT, H, Move window left, movewindow, l
bindd = SUPER SHIFT, J, Move window down, movewindow, d
bindd = SUPER SHIFT, K, Move window up, movewindow, u
bindd = SUPER SHIFT, L, Move window right, movewindow, r

# Layout
bindd = SUPER, E, Toggle split orientation, layoutmsg, togglesplit
bindd = SUPER, W, Toggle grouped layout, togglegroup
bindd = SUPER SHIFT, SPACE, Toggle floating, togglefloating,

# Resize windows
bindd = SUPER, code:20, Resize smaller, resizeactive, -50 0
bindd = SUPER, code:21, Resize larger, resizeactive, 50 0

# Workspaces 1-10 use Omarchy's default SUPER + number bindings.
bindd = SUPER, code:49, Switch to workspace 0, workspace, 0
bindd = SUPER SHIFT, code:49, Move window to workspace 0, movetoworkspace, 0
bindd = SUPER, TAB, Previous workspace, workspace, previous

# Window manager mode
bindd = SUPER SHIFT, COMMA, Window manager mode, submap, wm-settings

submap = wm-settings
bindd = , H, Resize width +50, resizeactive, 50 0
bind = , H, submap, reset
bindd = , J, Resize height +50, resizeactive, 0 50
bind = , J, submap, reset
bindd = , K, Resize height -50, resizeactive, 0 -50
bind = , K, submap, reset
bindd = , L, Resize width -50, resizeactive, -50 0
bind = , L, submap, reset
bindd = , BACKSPACE, Close other windows, exec, /home/vladkim/.config/hypr/scripts/close-other-windows
bind = , BACKSPACE, submap, reset
bindd = , RETURN, Reload Hyprland config, exec, hyprctl reload
bind = , RETURN, submap, reset
bind = , ESCAPE, submap, reset
bindd = SUPER SHIFT, H, Join with group on left, moveintogroup, l
bind = SUPER SHIFT, H, submap, reset
bindd = SUPER SHIFT, J, Join with group below, moveintogroup, d
bind = SUPER SHIFT, J, submap, reset
bindd = SUPER SHIFT, K, Join with group above, moveintogroup, u
bind = SUPER SHIFT, K, submap, reset
bindd = SUPER SHIFT, L, Join with group on right, moveintogroup, r
bind = SUPER SHIFT, L, submap, reset
bind = , catchall, submap, reset
submap = reset
