# Window rules ported from AeroSpace for Omarchy/Linux.

# Browsers to workspace 1
windowrule = workspace 1, match:tag chromium-based-browser
windowrule = workspace 1, match:tag firefox-based-browser

# Notes to workspace 2
windowrule = workspace 2, match:class ^(Notion|notion-app|chrome-.*notion[.]so.*)$

# Development apps to workspace 3
windowrule = workspace 3, match:class ^(jetbrains-.*|Cursor|cursor|Code|code|VSCodium|codium)$

# Terminals to workspace 4
windowrule = workspace 4, match:tag terminal

# AI apps and web apps to workspace 5
windowrule = workspace 5, match:class ^(Claude|claude|claude-desktop|chrome-.*claude[.](ai|com).*)$
windowrule = workspace 5, match:class ^(ChatGPT|chatgpt|chrome-.*chatgpt[.]com.*|Codex|codex)$

# File manager to workspace 6
windowrule = workspace 6, match:class ^(org[.]gnome[.]Nautilus|Nautilus|nautilus)$

# Messengers to workspace 10
windowrule = float on, match:class ^(discord|Discord|vesktop|Vesktop|chrome-.*discord[.]com.*)$
windowrule = workspace 10, match:class ^(discord|Discord|vesktop|Vesktop|chrome-.*discord[.]com.*)$
