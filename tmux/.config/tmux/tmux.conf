# Prefix
unbind -q C-b
unbind -q C-Space
set -g prefix C-a
set -g prefix2 None
bind C-a send-prefix

# Clean up bindings from older configs when reloading
unbind -q q
unbind -q v
unbind -q R
unbind -q C
unbind -q K
unbind -q P
unbind -q N
unbind -q -n C-M-Left
unbind -q -n C-M-Right
unbind -q -n C-M-Up
unbind -q -n C-M-Down
unbind -q -n C-M-S-Left
unbind -q -n C-M-S-Right
unbind -q -n C-M-S-Up
unbind -q -n C-M-S-Down
unbind -q -n M-Left
unbind -q -n M-Right
unbind -q -n M-Up
unbind -q -n M-Down

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Configuration reloaded"
bind q display-panes

# tmux sessionizer
bind -n C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
if-shell 'command -v wl-copy >/dev/null 2>&1' {
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'wl-copy'
} {
    if-shell 'command -v pbcopy >/dev/null 2>&1' {
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
    } {
        bind -T copy-mode-vi y send -X copy-selection-and-cancel
    }
}

# Vim-like pane switching
bind -r ^ last-window
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Windows
bind c new-window -c "#{pane_current_path}"
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

# General
set -g default-terminal "tmux-256color"
set -g terminal-overrides "linux*:AX@,*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
set -g extended-keys on
set -g extended-keys-format csi-u

# Status bar
set -g status-position top
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'

# Fallback theme for macOS and non-Omarchy environments
set -g status-style "bg=#333333,fg=#dcdcdc"
set -g status-left "#[fg=#333333,bg=#ff6b00,bold] #S #[bg=#333333] "
set -g status-right "#[fg=#ff6b00]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=#c7c7c7]#h "
set -g window-status-format "#[fg=#c7c7c7] #I:#W "
set -g window-status-current-format "#[fg=#ff6b00,bold] #I:#W "
set -g pane-border-style "fg=#444444"
set -g pane-active-border-style "fg=#ff6b00"
set -g message-style "bg=#333333,fg=#ff6b00"
set -g message-command-style "bg=#333333,fg=#ff6b00"
set -g mode-style "bg=#ff6b00,fg=#333333"
setw -g clock-mode-colour "#ff6b00"

# Omarchy overrides this file when available.
source-file -q ~/.config/omarchy/current/theme/tmux.conf
